name: Build and Publish Slim

on:
  release:
    types: [published]

concurrency:
  group: publish-slim-${{ github.event.release.id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-upload:
    if: github.repository == 'langgenius/dify-plugin-daemon'
    runs-on: ${{ matrix.goarch == 'arm64' && 'arm64_runner' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip
          - goos: windows
            goarch: arm64
            archive_ext: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build and package slim
        run: make package-slim GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Upload package to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "dist/assets/dify-plugin-slim-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive_ext }}" \
            --clobber
